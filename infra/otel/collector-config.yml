receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  debug:
    verbosity: basic
  # Uncomment when Langfuse OTLP endpoint is configured:
  # otlphttp:
  #   endpoint: http://langfuse-server:3000/api/public/otel

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
