name: Bug report
description: Report a defect in the harness, bootstrap flow, workflows, or documentation
title: "[bug]: "
labels:
  - task:infra
  - autonomy:L0
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Steps, commands, repository context, or workflow path needed to reproduce.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: input
    id: stack
    attributes:
      label: Stack
      description: One of `ts`, `python`, `go`, `ruby`, `php`, or `n/a`.
      placeholder: ts
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant output with secrets removed.
    validations:
      required: false
