name: Task
description: Agent-delegated work item with CC-SD contract and acceptance criteria
title: "[task]: "
body:
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One short paragraph describing what this task achieves.
      placeholder: One short paragraph describing what this task achieves.
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Bullet list of what this task must not do or change.
      placeholder: |
        - Item the task must not do or change
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Bullet list of technical or policy limits.
      placeholder: |
        - Technical or policy limits (stack, paths, time)
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Checkbox or bullet list with testable outcomes. Copied into the PR review gate.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: textarea
    id: rollback_hints
    attributes:
      label: Rollback hints
      description: Short revert or undo guidance if the change must be rolled back.
      placeholder: How to revert this change immediately if needed.
    validations:
      required: true

  - type: dropdown
    id: task_class
    attributes:
      label: Task class
      description: Triager or assignee must map this choice to the matching task:* label.
      options:
        - docs
        - test-fix
        - refactor
        - feature-small
        - dependency-bump
        - infra
        - security-sensitive
    validations:
      required: true

  - type: dropdown
    id: autonomy
    attributes:
      label: Max autonomy level
      description: Assignee must map this choice to the matching autonomy:* label.
      options:
        - L0
        - L1
        - L2
        - L3
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Optional background, links, or prior art.
    validations:
      required: false
